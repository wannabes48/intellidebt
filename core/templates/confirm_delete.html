{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm" style="border-top: 3px solid #ef4444 !important;">
            <div class="card-header py-3" style="background: rgba(239,68,68,0.06);">
                <h6 class="mb-0 fw-bold text-danger">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> CRITICAL WARNING
                </h6>
            </div>
            
            <div class="card-body text-center py-5">
                <div class="mb-3" style="opacity: 0.15;">
                    <i class="bi bi-trash3" style="font-size: 4rem; color: #ef4444;"></i>
                </div>
                <h5 class="fw-bold">Are you absolutely sure?</h5>
                
                <p class="text-muted mt-3">
                    You are about to permanently delete this <strong>{{ type }}</strong> record:
                </p>
                
                <div class="d-inline-block px-4 py-2 rounded-3 fw-bold" style="background: rgba(239,68,68,0.08); color: #991B1B; border: 1px solid rgba(239,68,68,0.2);">
                    {{ object }}
                </div>
                
                <p class="text-danger small mt-4 px-4 fw-bold">
                    <i class="bi bi-shield-x me-1"></i>
                    This action cannot be undone. All related history will be wiped from the database.
                </p>

                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 fw-bold btn-sm">
                            <i class="bi bi-arrow-left-circle me-1"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-danger px-4 fw-bold btn-sm shadow-sm">
                            <i class="bi bi-trash2-fill me-1"></i> Yes, Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
