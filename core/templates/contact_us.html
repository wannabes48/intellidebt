<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us — Intellidebt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2D6A4F; --accent: #52B788; --primary-pale: #F0FFF4; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .contact-card { background: #fff; border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-back { color: var(--primary); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="container py-5 my-5">
        <a href="/" class="btn-back"><i class="bi bi-arrow-left"></i> Back to Home</a>
        <div class="row g-5">
            <div class="col-lg-5">
                <h1 class="fw-extrabold mb-4 text-primary">Get in Touch</h1>
                <p class="text-muted mb-5">Have questions about our AI models or enterprise pricing? Our team is ready to help you optimize your portfolio.</p>
                
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="rounded-circle bg-white shadow-sm d-flex align-items-center justify-content-center text-primary" style="width: 48px; height: 48px;">
                        <i class="bi bi-envelope"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">Email Us</h6>
                        <p class="text-muted small mb-0">support@intellidebt.ai</p>
                    </div>
                </div>
                
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="rounded-circle bg-white shadow-sm d-flex align-items-center justify-content-center text-primary" style="width: 48px; height: 48px;">
                        <i class="bi bi-geo-alt"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">Our HQ</h6>
                        <p class="text-muted small mb-0">Tech Tower, Waiyaki Way, Nairobi, Kenya</p>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-7">
                <div class="card contact-card p-4 p-md-5">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Full Name</label>
                                <input type="text" class="form-control p-3 border-0 bg-light" placeholder="John Doe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Email Address</label>
                                <input type="email" class="form-control p-3 border-0 bg-light" placeholder="john@company.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Message</label>
                                <textarea class="form-control p-3 border-0 bg-light" rows="5" placeholder="Tell us about your loan portfolio..."></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="button" class="btn btn-primary w-100 py-3 fw-bold" style="background: var(--primary); border: none;">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
