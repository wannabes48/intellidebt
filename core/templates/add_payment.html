{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="d-flex align-items-center gap-2 mb-3">
            <a href="{% url 'loan_detail' loan.id %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
            <h5 class="fw-bold mb-0">Record Payment</h5>
        </div>
        <div class="card border-0 shadow-sm" style="border-top: 3px solid var(--accent) !important;">
            <div class="card-body p-4">
                <div class="p-3 rounded-3 mb-3" style="background: var(--primary-pale); border: 1px solid var(--primary-lighter);">
                    <p class="mb-1 small text-muted">Client</p>
                    <p class="fw-bold mb-0" style="color: var(--primary);">{{ loan.client.name }}</p>
                </div>
                <div class="p-3 rounded-3 mb-3 border">
                    <p class="mb-1 small text-muted">Outstanding Balance</p>
                    <h5 class="fw-bold mb-0">KES {{ loan.outstanding_amount|stringformat:".2f" }}</h5>
                </div>
                <hr style="border-color: var(--border-color);">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Payment Amount (KES)</label>
                        {{ form.amount_paid }}
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">
                            <i class="bi bi-check-circle me-1"></i> Confirm Payment
                        </button>
                        <a href="{% url 'loan_detail' loan.id %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
